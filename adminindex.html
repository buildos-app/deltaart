<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BuildOS — نظام إدارة التشطيبات</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--bg4:#252530;
  --accent:#f5a623;--accent2:#ffd166;--adim:rgba(245,166,35,.13);
  --green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--orange:#f59e0b;
  --txt:#f0eff4;--txt2:#8b8b9e;--txt3:#5a5a6e;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.13);
  --sh:0 4px 24px rgba(0,0,0,.4);--shlg:0 16px 64px rgba(0,0,0,.6);
  --r:14px;--rs:8px;--sw:270px;
  --far:'Noto Sans Arabic',sans-serif;--fen:'Syne',sans-serif;
}
body{font-family:var(--far);background:var(--bg);color:var(--txt);direction:rtl;overflow-x:hidden}
#root{min-height:100vh}

/* loading */
.ls{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.ll{font-family:var(--fen);font-size:42px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.ll span{color:var(--txt3)}
.spin{width:36px;height:36px;border:3px solid var(--adim);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* auth */
.ap{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative}
.ap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% -10%,rgba(245,166,35,.12) 0%,transparent 70%);pointer-events:none}
.ab{background:var(--bg2);border:1px solid var(--brd2);border-radius:20px;padding:44px 40px;width:440px;max-width:calc(100vw - 32px);box-shadow:var(--shlg);position:relative;z-index:1}
.alt{font-family:var(--fen);font-size:36px;font-weight:800;color:var(--accent);letter-spacing:-1px;text-align:center}
.als{font-size:12px;color:var(--txt3);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;margin-top:4px}
.atabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;gap:4px;margin-bottom:24px}
.atab{flex:1;padding:9px;text-align:center;border:none;background:transparent;color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;font-family:var(--far);transition:all .2s}
.atab.act{background:var(--accent);color:var(--bg)}

/* forms */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--brd);border-radius:var(--rs);font-size:14px;font-family:var(--far);color:var(--txt);outline:none;transition:border-color .2s;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg select option{background:var(--bg3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.rrow{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:var(--txt2);cursor:pointer}
.rrow input{accent-color:var(--accent);width:15px;height:15px}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:var(--far);transition:all .18s;white-space:nowrap}
.ba{background:var(--accent);color:var(--bg)}.ba:hover{background:var(--accent2);transform:translateY(-1px)}
.bg{background:transparent;border:1.5px solid var(--brd2);color:var(--txt)}.bg:hover{border-color:var(--accent);color:var(--accent)}
.bd{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.bd:hover{background:rgba(239,68,68,.25)}
.bs{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.bw{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid rgba(245,158,11,.3)}
.bsm{padding:6px 12px;font-size:12px;border-radius:6px}
.bfl{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed}
.em{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.sm{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.3);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}

/* layout */
.lay{display:flex;min-height:100vh}
.mhdr{display:none;position:fixed;top:0;right:0;left:0;height:56px;background:var(--bg2);border-bottom:1px solid var(--brd);z-index:200;align-items:center;padding:0 16px;gap:12px}
.mhdr .mlogo{font-family:var(--fen);font-size:18px;font-weight:800;color:var(--accent);flex:1}
.hbg{background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer}
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:299}
.sov.op{display:block}

/* sidebar */
.sb{width:var(--sw);background:var(--bg2);border-left:1px solid var(--brd);display:flex;flex-direction:column;position:fixed;height:100vh;right:0;top:0;z-index:100;overflow-y:auto}
.sbl{padding:24px 20px 16px;border-bottom:1px solid var(--brd)}
.sbl .lt{font-family:var(--fen);font-size:24px;font-weight:800;color:var(--accent)}
.sbl .ls2{font-size:11px;color:var(--txt3);margin-top:2px;letter-spacing:1px}
.sbu{padding:12px 20px;border-bottom:1px solid var(--brd)}
.rb{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:3px}
.rb-sa{background:rgba(245,166,35,.2);color:var(--accent)}
.rb-ow{background:rgba(59,130,246,.2);color:var(--blue)}
.rb-mg{background:rgba(139,92,246,.2);color:var(--purple)}
.rb-em{background:rgba(16,185,129,.2);color:var(--green)}
.sbnav{flex:1;padding:10px 0}
.nsc{padding:8px 20px 3px;font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:var(--txt2);border-right:3px solid transparent;margin:1px 0}
.ni:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.ni.act{background:var(--adim);color:var(--accent);border-right-color:var(--accent)}
.nic{font-size:15px;width:20px;text-align:center}
.sbb{padding:14px 20px;border-top:1px solid var(--brd)}

/* main */
.main{margin-right:var(--sw);flex:1;padding:28px;background:var(--bg);min-height:100vh}
.ph{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.ph h1{font-family:var(--fen);font-size:26px;font-weight:800;color:var(--txt)}
.ph p{color:var(--txt3);font-size:13px;margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:20px}
.ct{font-family:var(--fen);font-size:14px;font-weight:700;margin-bottom:16px;color:var(--txt);display:flex;align-items:center;gap:8px}
.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.mt12{margin-top:12px}.mt16{margin-top:16px}

/* stats */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:18px}
.sc{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:12px}
.si{font-size:26px}.sv{font-family:var(--fen);font-size:22px;font-weight:800}.sl{font-size:10px;color:var(--txt3);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.sa{border-top:3px solid var(--accent)}.sg2{border-top:3px solid var(--green)}.sb2{border-top:3px solid var(--blue)}.sr{border-top:3px solid var(--red)}.sp{border-top:3px solid var(--purple)}

/* table */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:480px}
thead th{background:var(--bg3);padding:9px 12px;text-align:right;font-size:11px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:1px}
tbody tr{border-bottom:1px solid var(--brd);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:10px 12px;font-size:13px}

/* badges */
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.ba2{background:rgba(245,166,35,.15);color:var(--accent)}
.bg2{background:rgba(16,185,129,.15);color:var(--green)}
.br2{background:rgba(239,68,68,.15);color:var(--red)}
.bb2{background:rgba(59,130,246,.15);color:var(--blue)}
.bgr{background:var(--bg3);color:var(--txt2)}
.bpu{background:rgba(139,92,246,.15);color:var(--purple)}
.bor{background:rgba(245,158,11,.15);color:var(--orange)}

/* modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.md{background:var(--bg2);border:1px solid var(--brd2);border-radius:20px;padding:26px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shlg)}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mtt{font-family:var(--fen);font-size:17px;font-weight:800;color:var(--txt)}
.mcl{background:none;border:none;color:var(--txt3);font-size:20px;cursor:pointer}
.mcl:hover{color:var(--red)}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px}
.chip{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg3);border:1.5px solid transparent;cursor:pointer;transition:all .15s;color:var(--txt2)}
.chip.act{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.pcs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.pc{padding:9px 12px;background:var(--bg3);border:1.5px solid transparent;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;color:var(--txt2);display:flex;align-items:center;gap:8px;transition:all .15s}
.pc.act{background:var(--adim);border-color:var(--accent);color:var(--accent)}

/* search */
.sw{position:relative}
.si2{width:100%;padding:10px 38px 10px 14px;background:var(--bg3);border:1.5px solid var(--brd);border-radius:var(--rs);font-size:13px;font-family:var(--far);color:var(--txt);outline:none}
.si2:focus{border-color:var(--accent)}
.sic{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:14px;pointer-events:none}

/* misc */
.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.fg2{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.es{text-align:center;padding:48px 24px;color:var(--txt3)}
.ei{font-size:40px;margin-bottom:10px}
.dv{height:1px;background:var(--brd);margin:16px 0}
.ts{font-size:12px}.tx{font-size:11px}.tm{color:var(--txt3)}.ta{color:var(--accent)}.tg{color:var(--green)}.trd{color:var(--red)}
.fb2{font-weight:700}.fen{font-family:var(--fen)}

/* client card */
.cc{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s;flex-wrap:wrap;gap:10px}
.cc:hover{border-color:var(--brd2)}
.cav{width:40px;height:40px;border-radius:50%;background:var(--adim);border:2px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--fen);font-size:14px;font-weight:800;flex-shrink:0}

/* attendance */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.ac{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);padding:12px}
.an{font-weight:700;font-size:13px;margin-bottom:6px}
.ab2{padding:5px 9px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;font-family:var(--far);transition:all .15s;background:var(--bg4);color:var(--txt2)}

/* bar chart */
.bc{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:10px}
.bcl{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.bcf{width:100%;background:var(--accent);border-radius:4px 4px 0 0;min-height:3px}
.bclb{font-size:10px;color:var(--txt3)}

/* invoice */
.inv{background:white;color:#111;padding:36px;border-radius:12px;font-family:var(--far);direction:rtl}
.invl{font-family:var(--fen);font-size:26px;font-weight:800;color:#f5a623}
.invt th{background:#f5f5f5;padding:8px 12px;text-align:right;font-size:12px;font-weight:700;border:1px solid #eee}
.invt td{padding:8px 12px;border:1px solid #eee;font-size:13px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeUp .25s ease}

@media(max-width:768px){
  .mhdr{display:flex}
  .sb{transform:translateX(100%);z-index:300;transition:transform .3s}
  .sb.op{transform:translateX(0)}
  .main{margin-right:0!important;padding:68px 12px 24px}
  .sg{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
  .mo{align-items:flex-end;padding:0}
  .md{border-radius:20px 20px 0 0;max-width:100vw}
  .ph h1{font-size:20px}
}
@media(max-width:480px){
  .g3{grid-template-columns:1fr}
  .ag{grid-template-columns:1fr 1fr}
}
</style>
</head>

<div id="root"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOBaMkl_j-dwFiq85ioDjwVipvLCA61AA",
  authDomain: "buildos-42ba1.firebaseapp.com",
  databaseURL: "https://buildos-42ba1-default-rtdb.firebaseio.com",
  projectId: "buildos-42ba1",
  storageBucket: "buildos-42ba1.firebasestorage.app",
  messagingSenderId: "149653468755",
  appId: "1:149653468755:web:a639f019e871880f88b8a6",
  measurementId: "G-82J7V8MZX4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const fbGet  = (path) => db.ref(path).get().then(s => s.exists() ? s.val() : null);
const fbSet  = (path, val) => db.ref(path).set(val);
const fbUpd  = (path, val) => db.ref(path).update(val);
const fbDel  = (path) => db.ref(path).remove();
const fbOn   = (path, cb) => { const ref = db.ref(path); ref.on('value', s => cb(s.exists() ? s.val() : null)); return () => ref.off(); };
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const getNow = () => { const n=new Date(); return new Date(n.getTime()+n.getTimezoneOffset()*60000+2*3600000); };
const today     = () => getNow().toISOString().slice(0,10);
const thisMonth = () => getNow().toISOString().slice(0,7);
const getTime   = () => getNow().toTimeString().slice(0,5);
const genId = (ex=[]) => { let id; do{id=Math.random().toString(36).slice(2,8).toUpperCase();}while(ex.includes(id)); return id; };

const PMS = [
  {id:"cash",label:"كاش",icon:"💵"},
  {id:"vodafone",label:"Vodafone Cash",icon:"📱"},
  {id:"instapay",label:"InstaPay",icon:"⚡"},
  {id:"visa",label:"Visa",icon:"💳"},
  {id:"transfer",label:"تحويل بنكي",icon:"🏦"},
];
const ATTS = [
  {id:"present",label:"حاضر",color:"#10b981"},
  {id:"absent",label:"غائب",color:"#ef4444"},
  {id:"late",label:"متأخر",color:"#f59e0b"},
  {id:"leave",label:"إجازة",color:"#6366f1"},
];

const seed = async () => {
  const ex = await fbGet("users/superadmin");
  if(ex) return;
  await fbSet("users/superadmin",{id:"superadmin",username:"admin",password:"admin123",role:"superadmin",name:"Super Admin",active:true});
};

/* ===== SHARED COMPONENTS ===== */
const Modal = ({title,onClose,children}) => (
  <div className="mo" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="md fi">
      {title&&<div className="mhd"><h2 className="mtt">{title}</h2><button className="mcl" onClick={onClose}>✕</button></div>}
      {children}
    </div>
  </div>
);
const Empty = ({icon,text}) => <div className="es"><div className="ei">{icon}</div><p>{text}</p></div>;
const StatCard = ({icon,val,lbl,cls}) => (
  <div className={`sc ${cls}`}><span className="si">{icon}</span><div><div className="sv">{val}</div><div className="sl">{lbl}</div></div></div>
);

/* ===== APP ===== */
function App(){
  const [user,setUser]   = useState(null);
  const [page,setPage]   = useState("dashboard");
  const [msg,setMsg]     = useState(null);
  const [sbOpen,setSb]   = useState(false);
  const [loading,setLd]  = useState(true);

  useEffect(()=>{
    const init = async()=>{
      await seed();
      const sv = localStorage.getItem("buildos_s");
      if(sv){
        try{
          const s=JSON.parse(sv);
          const u=await fbGet(`users/${s.id}`);
          if(u&&u.active!==false) setUser(u);
        }catch(e){}
      }
      setLd(false);
    };
    init();
  },[]);

  const showMsg=(t,tp="success")=>{setMsg({t,tp});setTimeout(()=>setMsg(null),3500)};
  const doLogin=(u,rem)=>{setUser(u);if(rem)localStorage.setItem("buildos_s",JSON.stringify({id:u.id}))};
  const doLogout=()=>{localStorage.removeItem("buildos_s");setUser(null);setPage("dashboard")};

  if(loading) return <div className="ls"><div className="ll">Build<span>OS</span></div><div className="spin"/><div style={{color:"var(--txt3)",fontSize:13}}>جاري التحميل...</div></div>;
  if(!user)   return <AuthPage onLogin={doLogin}/>;

  return (
    <div className="lay fi">
      <div className="mhdr">
        <button className="hbg" onClick={()=>setSb(true)}>☰</button>
        <div className="mlogo">BuildOS</div>
      </div>
      <div className={`sov ${sbOpen?"op":""}`} onClick={()=>setSb(false)}/>
      <Sidebar user={user} page={page} setPage={p=>{setPage(p);setSb(false)}} onLogout={doLogout} isOpen={sbOpen}/>
      <main className="main">
        {msg&&<div className={msg.tp==="error"?"em":"sm"} style={{marginBottom:14}}>{msg.t}</div>}
        {page==="dashboard"  && <DashPage user={user}/>}
        {page==="clients"    && <ClientsPage user={user} showMsg={showMsg}/>}
        {page==="leads"      && <LeadsPage user={user} showMsg={showMsg}/>}
        {page==="projects"   && <ProjectsPage user={user} showMsg={showMsg}/>}
        {page==="products"   && <ProductsPage user={user} showMsg={showMsg}/>}
        {page==="invoices"   && <InvoicesPage user={user} showMsg={showMsg}/>}
        {page==="employees"  && (user.role==="owner"||user.role==="manager"||user.role==="superadmin") && <EmpPage user={user} showMsg={showMsg}/>}
        {page==="attendance" && <AttPage user={user} showMsg={showMsg}/>}
        {page==="revenue"    && (user.role==="owner"||user.role==="superadmin") && <RevPage user={user}/>}
        {page==="shops"      && user.role==="superadmin" && <ShopsPage showMsg={showMsg}/>}
        {page==="users"      && user.role==="superadmin" && <UsersPage showMsg={showMsg}/>}
        {page==="settings"   && <SettingsPage user={user} showMsg={showMsg}/>}
      </main>
    </div>
  );
}

/* ===== AUTH ===== */
function AuthPage({onLogin}){
  const [tab,setTab]=useState("login");
  const [form,setForm]=useState({username:"",password:"",shopName:"",ownerName:""});
  const [err,setErr]=useState("");const [ld,setLd]=useState(false);const [rem,setRem]=useState(true);
  const h=(f,v)=>setForm(x=>({...x,[f]:v}));

  const login=async()=>{
    setErr("");setLd(true);
    const users=await fbGet("users");
    if(!users){setErr("لا يوجد مستخدمين");setLd(false);return;}
    const u=Object.values(users).find(u=>u.username===form.username&&u.password===form.password);
    if(!u){setErr("اسم المستخدم أو كلمة المرور غلط");setLd(false);return;}
    if(u.pending){setErr("حسابك في انتظار الموافقة");setLd(false);return;}
    if(u.active===false){setErr("هذا الحساب موقوف");setLd(false);return;}
    onLogin(u,rem);setLd(false);
  };

  const signup=async()=>{
    setErr("");setLd(true);
    if(!form.shopName||!form.username||!form.password||!form.ownerName){setErr("ارجاء ملء كل الحقول");setLd(false);return;}
    const users=await fbGet("users");
    if(users&&Object.values(users).find(u=>u.username===form.username)){setErr("اسم المستخدم موجود");setLd(false);return;}
    const sid="shop_"+Date.now(),uid="u_"+Date.now();
    await fbSet(`shops/${sid}`,{id:sid,name:form.shopName,ownerName:form.ownerName,createdAt:today(),active:true});
    await fbSet(`users/${uid}`,{id:uid,username:form.username,password:form.password,role:"owner",name:form.ownerName,shopId:sid,active:true});
    setTab("login");setLd(false);
  };

  return (
    <div className="ap">
      <div className="ab">
        <div className="alt">BuildOS</div>
        <div className="als">Construction &amp; Finishing Management</div>
        <div className="atabs">
          <button className={`atab ${tab==="login"?"act":""}`} onClick={()=>setTab("login")}>تسجيل الدخول</button>
          <button className={`atab ${tab==="signup"?"act":""}`} onClick={()=>setTab("signup")}>شركة جديدة</button>
        </div>
        {err&&<div className="em">{err}</div>}
        {tab==="login"?(
          <>
            <div className="fg"><label>اسم المستخدم</label><input value={form.username} onChange={e=>h("username",e.target.value)}/></div>
            <div className="fg"><label>كلمة المرور</label><input type="password" value={form.password} onChange={e=>h("password",e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/></div>
            <label className="rrow"><input type="checkbox" checked={rem} onChange={e=>setRem(e.target.checked)}/>ابقى متسجل</label>
            <button className="btn ba bfl" onClick={login} disabled={ld}>{ld?"جاري الدخول...":"دخول ←"}</button>
          </>
        ):(
          <>
            <div className="fg"><label>اسم الشركة</label><input value={form.shopName} onChange={e=>h("shopName",e.target.value)}/></div>
            <div className="fg"><label>اسم صاحب الشركة</label><input value={form.ownerName} onChange={e=>h("ownerName",e.target.value)}/></div>
            <div className="g2">
              <div className="fg"><label>اسم المستخدم</label><input value={form.username} onChange={e=>h("username",e.target.value)}/></div>
              <div className="fg"><label>كلمة المرور</label><input type="password" value={form.password} onChange={e=>h("password",e.target.value)}/></div>
            </div>
            <label className="rrow"><input type="checkbox" checked={rem} onChange={e=>setRem(e.target.checked)}/>ابقى متسجل</label>
            <button className="btn ba bfl" onClick={signup} disabled={ld}>{ld?"جاري الإنشاء...":"إنشاء الشركة 🏗️"}</button>
          </>
        )}
      </div>
    </div>
  );
}

/* ===== PROJECTS ===== */
function ProjectsPage({user,showMsg}){
  const [projs,setProj]=useState([]);
  const [clients,setCl]=useState([]);
  const [prods,setPr]=useState([]);
  const [modal,setM]=useState(null);const [sel,setSel]=useState(null);
  const [form,setF]=useState({cid:"",name:"",desc:"",status:"جاري",budget:"",start:today(),notes:""});
  const [iForm,setIF]=useState({type:"product",pid:"",cname:"",qty:1,up:"",note:""});

  useEffect(()=>{
    const u1=fbOn(`projects_${user.shopId}`,v=>setProj(v?Object.values(v):[]));
    const u2=fbOn(`clients_${user.shopId}`,v=>setCl(v?Object.values(v):[]));
    const u3=fbOn(`products_${user.shopId}`,v=>setPr(v?Object.values(v):[]));
    return()=>{u1();u2();u3();};
  },[]);

  const saveProj=async()=>{
    if(!form.cid||!form.name){showMsg("اختار العميل واكتب اسم المشروع","error");return;}
    const id=sel?.id||"prj_"+Date.now();
    const cl=clients.find(c=>c.id===form.cid);
    await fbSet(`projects_${user.shopId}/${id}`,{id,clientId:form.cid,clientName:cl?.name||"",name:form.name,description:form.desc,status:form.status,budget:Number(form.budget||0),startDate:form.start,notes:form.notes,items:sel?.items||[],createdAt:sel?.createdAt||today()});
    setM(null);setSel(null);setF({cid:"",name:"",desc:"",status:"جاري",budget:"",start:today(),notes:""});showMsg("تم حفظ المشروع ✓");
  };

  const addItem=async()=>{
    if(!sel) return;
    const prod=iForm.type==="product"?prods.find(p=>p.id===iForm.pid):null;
    const name=prod?prod.name:iForm.cname;
    if(!name){showMsg("اكتب اسم البند","error");return;}
    const up=Number(iForm.up||prod?.sellPrice||0);
    const item={id:"item_"+Date.now(),type:iForm.type,name,qty:Number(iForm.qty||1),unitPrice:up,total:Number(iForm.qty||1)*up,note:iForm.note,productId:prod?.id||null};
    const ui=[...(sel.items||[]),item];
    await fbUpd(`projects_${user.shopId}/${sel.id}`,{items:ui});
    setSel(p=>({...p,items:ui}));
    setIF({type:"product",pid:"",cname:"",qty:1,up:"",note:""});showMsg("تم إضافة البند ✓");
  };

  const rmItem=async(iid)=>{
    const ui=(sel.items||[]).filter(i=>i.id!==iid);
    await fbUpd(`projects_${user.shopId}/${sel.id}`,{items:ui});
    setSel(p=>({...p,items:ui}));
  };

  const del=async(id)=>{if(!confirm("حذف المشروع؟"))return;await fbDel(`projects_${user.shopId}/${id}`);showMsg("تم الحذف");};
  const STS=["جاري","مكتمل","متوقف","قيد المراجعة"];
  const SC={"جاري":"bb2","مكتمل":"bg2","متوقف":"br2","قيد المراجعة":"bor"};

  return(
    <div className="fi">
      <div className="ph">
        <div><h1>المشاريع</h1><p>{projs.length} مشروع</p></div>
        <button className="btn ba" onClick={()=>{setSel(null);setF({cid:"",name:"",desc:"",status:"جاري",budget:"",start:today(),notes:""});setM("form");}}>+ مشروع جديد</button>
      </div>
      {projs.length===0?<Empty icon="🏗️" text="لا يوجد مشاريع بعد"/>:
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {projs.slice().reverse().map(p=>{
            const tot=(p.items||[]).reduce((s,i)=>s+i.total,0);
            return(
              <div key={p.id} className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                <div>
                  <div className="fb2" style={{fontSize:14}}>🏗️ {p.name}</div>
                  <div className="tx tm">{p.clientName} · {p.startDate}</div>
                  {tot>0&&<div className="tx ta" style={{marginTop:3}}>إجمالي البنود: {tot.toLocaleString()} ج</div>}
                </div>
                <div className="fg2">
                  <span className={`bdg ${SC[p.status]||"bgr"}`}>{p.status}</span>
                  <button className="btn bg bsm" onClick={()=>{setSel(p);setM("detail");}}>تفاصيل / بنود</button>
                  <button className="btn bg bsm" onClick={()=>{setSel(p);setF({cid:p.clientId,name:p.name,desc:p.description||"",status:p.status,budget:p.budget||"",start:p.startDate,notes:p.notes||""});setM("form");}}>تعديل</button>
                  <button className="btn bd bsm" onClick={()=>del(p.id)}>حذف</button>
                </div>
              </div>
            );
          })}
        </div>}

      {modal==="form"&&<Modal title={sel?"تعديل المشروع":"مشروع جديد"} onClose={()=>setM(null)}>
        <div className="fg"><label>العميل</label><select value={form.cid} onChange={e=>setF(f=>({...f,cid:e.target.value}))}><option value="">— اختار عميل —</option>{clients.map(c=><option key={c.id} value={c.id}>#{c.id} — {c.name}</option>)}</select></div>
        <div className="g2">
          <div className="fg"><label>اسم المشروع</label><input value={form.name} onChange={e=>setF(f=>({...f,name:e.target.value}))}/></div>
          <div className="fg"><label>الميزانية التقديرية</label><input type="number" value={form.budget} onChange={e=>setF(f=>({...f,budget:e.target.value}))}/></div>
        </div>
        <div className="fg"><label>وصف المشروع</label><textarea rows={2} value={form.desc} onChange={e=>setF(f=>({...f,desc:e.target.value}))}/></div>
        <div className="g2">
          <div className="fg"><label>تاريخ البداية</label><input type="date" value={form.start} onChange={e=>setF(f=>({...f,start:e.target.value}))}/></div>
          <div className="fg"><label>الحالة</label><div className="chips">{STS.map(s=><div key={s} className={`chip ${form.status===s?"act":""}`} onClick={()=>setF(f=>({...f,status:s}))}>{s}</div>)}</div></div>
        </div>
        <div className="fg"><label>ملاحظات</label><textarea rows={2} value={form.notes} onChange={e=>setF(f=>({...f,notes:e.target.value}))}/></div>
        <div className="fg2 mt16"><button className="btn ba" style={{flex:1}} onClick={saveProj}>حفظ</button><button className="btn bg" onClick={()=>setM(null)}>إلغاء</button></div>
      </Modal>}

      {modal==="detail"&&sel&&<Modal title={`🏗️ ${sel.name}`} onClose={()=>setM(null)}>
        <div style={{background:"var(--bg3)",borderRadius:10,padding:"11px 14px",marginBottom:14,fontSize:13}}>
          <div className="fb"><span>العميل: <strong>{sel.clientName}</strong></span><span className={`bdg ${SC[sel.status]||"bgr"}`}>{sel.status}</span></div>
          {sel.description&&<div style={{marginTop:5,color:"var(--txt3)"}}>{sel.description}</div>}
        </div>

function EmpPage({user,showMsg}){

  const [form,setF]=useState({name:"",uname:"",pass:"",role:"employee",phone:"",salary:""});

  const save=async()=>{
    if(!form.name||!form.uname){showMsg("ملء كل الحقول مطلوب","error");return;}
    if(eu){
      const upd={name:form.name,username:form.uname,role:form.role,phone:form.phone,salary:Number(form.salary||0)};
      if(form.pass)upd.password=form.pass;
      await fbUpd(`users/${eu.id}`,upd);showMsg("تم التعديل ✓");

      if(users&&Object.values(users).find(u=>u.username===form.uname)){showMsg("اسم المستخدم موجود","error");return;}
      const id="emp_"+Date.now();
      await fbSet(`users/${id}`,{id,username:form.uname,password:form.pass,role:form.role,name:form.name,phone:form.phone,salary:Number(form.salary||0),shopId:user.shopId,active:true,joinDate:today()});

              const act=e.active!==false;
              return(

                  <td><span className={`bdg ${e.role==="manager"?"bpu":"bb2"}`}>{e.role==="manager"?"مدير":"موظف"}</span></td>

                  <td>{e.salary?<span className="bdg ba2">{e.salary?.toLocaleString()} ج</span>:"—"}</td>
                  <td><span className={`bdg ${act?"bg2":"br2"}`}>{act?"نشط":"موقوف"}</span></td>
                  <td><div className="fg2">
                    <button className="btn bg bsm" onClick={()=>{setEU(e);setF({name:e.name,uname:e.username,pass:"",role:e.role,phone:e.phone||"",salary:e.salary||""});setM(true);}}>تعديل</button>
                    <button className={`btn bsm ${act?"bw":"bs"}`} onClick={()=>tog(e.id,act)}>{act?"تعطيل":"تفعيل"}</button>
                  </div></td>

            })}</tbody>

      </div>
      {modal&&<Modal title={eu?"تعديل موظف":"إضافة موظف"} onClose={()=>{setM(false);setEU(null);}}>
        <div className="g2">
          <div className="fg"><label>الاسم الكامل</label><input value={form.name} onChange={e=>setF(f=>({...f,name:e.target.value}))}/></div>
          <div className="fg"><label>التليفون</label><input value={form.phone} onChange={e=>setF(f=>({...f,phone:e.target.value}))}/></div>
        </div>
        <div className="fg"><label>الدور</label><div className="chips"><div className={`chip ${form.role==="employee"?"act":""}`} onClick={()=>setF(f=>({...f,role:"employee"}))}>👷 موظف</div><div className={`chip ${form.role==="manager"?"act":""}`} onClick={()=>setF(f=>({...f,role:"manager"}))}>📋 مدير</div></div></div>

      </Modal>}
    </div>
  );

/* ===== ATTENDANCE ===== */
function AttPage({user,showMsg}){
  const [staff,setS]=useState([]);const [att,setAtt]=useState({});
  const [filter,setF]=useState("daily");const [vdate,setVD]=useState(today());const [range,setR]=useState("week");

  useEffect(()=>{
    const u1=fbOn("users",v=>{if(v)setS(Object.values(v).filter(u2=>u2.shopId===user.shopId&&(u2.role==="employee"||u2.role==="manager")));});
    const u2=fbOn(`attendance_${user.shopId}`,v=>setAtt(v||{}));
    return()=>{u1();u2();};
  },[]);

  const setSt=async(eid,date,status)=>{
    await fbSet(`attendance_${user.shopId}/${date}_${eid}`,{empId:eid,date,status,by:user.id,at:getTime()});
    showMsg("تم التسجيل ✓");
  };
  const getSt=(eid,date)=>att[`${date}_${eid}`]?.status||null;

  const getDR=(r)=>{
    const dates=[];const end=getNow();let start=new Date(getNow());
    if(r==="week")start.setDate(start.getDate()-6);
    else if(r==="two_weeks")start.setDate(start.getDate()-13);
    else start.setDate(start.getDate()-29);
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))dates.push(d.toISOString().slice(0,10));
    return dates;
  };

  const rd=getDR(range);
  const getStats=(eid,dates)=>{
    const s={present:0,absent:0,late:0,leave:0,total:dates.length};
    dates.forEach(d=>{const st=getSt(eid,d);if(st)s[st]=(s[st]||0)+1;});
    s.unrecorded=s.total-(s.present+s.absent+s.late+s.leave);return s;
  };

function RevPage({user}){
  const [sess,setSess]=useState([]);const [invs,setI]=useState([]);
  useEffect(()=>{
    const u1=fbOn(`sessions_${user.shopId}`,v=>setSess(v?Object.values(v):[]));
    const u2=fbOn(`invoices_${user.shopId}`,v=>setI(v?Object.values(v):[]));
    return()=>{u1();u2();};
  },[]);
  const ms=sess.filter(s=>s.date?.startsWith(thisMonth()));
  const mr=ms.reduce((s,x)=>s+(x.amount||0),0);
  const pt=invs.filter(i=>i.payStatus!=="paid").reduce((s,i)=>s+(i.total||0),0);
  const days=Array.from({length:7},(_,i)=>{const d=getNow();d.setDate(d.getDate()-(6-i));return d.toISOString().slice(0,10);});
  const dr=days.map(d=>({lb:new Date(d).toLocaleDateString("ar-EG",{weekday:"short"}),v:sess.filter(s=>s.date===d).reduce((s2,s)=>s2+(s.amount||0),0)}));
  const mx=Math.max(...dr.map(d=>d.v),1);
  const bm=PMS.map(pm=>({...pm,tot:ms.filter(s=>s.paymentMethod===pm.id).reduce((s,x)=>s+x.amount,0)})).filter(p=>p.tot>0);
  return(
    <div className="fi">
      <div className="ph"><h1>الإيرادات</h1><p>{thisMonth()}</p></div>
      <div className="sg">
        <StatCard icon="💰" val={mr.toLocaleString()+" ج"} lbl="إيراد الشهر" cls="sa"/>

        <StatCard icon="⏳" val={pt.toLocaleString()+" ج"} lbl="فواتير معلقة" cls="sr"/>

      </div>
      <div className="card mb16">
        <div className="ct">📈 آخر 7 أيام</div>
        <div className="bc">
          {dr.map((d,i)=>(
            <div key={i} className="bcl">
              <div style={{flex:1,display:"flex",alignItems:"flex-end",width:"100%"}}>
                <div className="bcf" style={{height:`${(d.v/mx)*100}%`,opacity:i===6?1:.6}}/>
              </div>
              <span className="bclb">{d.lb}</span>
              {d.v>0&&<span className="bclb" style={{color:"var(--accent)"}}>{d.v}</span>}
            </div>
          ))}
        </div>
      </div>
      {bm.length>0&&<div className="card"><div className="ct">💳 حسب طريقة الدفع</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {bm.map(pm=><div key={pm.id} className="sc sa" style={{flex:"1 1 120px"}}><span className="si">{pm.icon}</span><div><div className="sv">{pm.tot.toLocaleString()} ج</div><div className="sl">{pm.label}</div></div></div>)}
        </div>
      </div>}
    </div>
  );
}

/* ===== LEADS PAGE ===== */
function LeadsPage({user,showMsg}){
  const [leads,setL]=useState([]);
  const [sel,setSel]=useState(null);
  const [filter,setF]=useState("all");

  useEffect(()=>fbOn(`leads_${user.shopId}`,v=>setL(v?Object.values(v).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)):[])),[]);

  const updateStatus=async(id,status)=>{
    await fbUpd(`leads_${user.shopId}/${id}`,{status});
    showMsg("تم التحديث ✓");
    if(sel?.id===id) setSel(s=>({...s,status}));
  };

  const convertToClient=async(lead)=>{
    if(!confirm("تحويل الـ Lead ده لعميل جديد في النظام؟")) return;
    const existingClients=await fbGet(`clients_${user.shopId}`);
    const ids=existingClients?Object.keys(existingClients):[];
    const used=ids.map(id=>parseInt(id)).filter(n=>!isNaN(n));
    let newId=1;
    while(used.includes(newId)) newId++;
    const clientId=String(newId).padStart(3,"0");
    await fbSet(`clients_${user.shopId}/${clientId}`,{
      id:clientId,name:lead.name,phone:lead.phone,
      address:lead.location||"",
      notes:`مصدر: الموقع الإلكتروني — ${lead.service}${lead.area?` — ${lead.area} م²`:""}${lead.message?" — "+lead.message:""}`,
      createdAt:lead.date||new Date().toISOString().slice(0,10)
    });
    await fbUpd(`leads_${user.shopId}/${lead.id}`,{status:"converted",clientId});
    showMsg(`تم إنشاء العميل #${clientId} ✓`);
    setSel(null);
  };

  const STATUSES=[
    {id:"all",label:"الكل"},
    {id:"new",label:"جديد 🔥"},
    {id:"contacted",label:"تم التواصل"},
    {id:"converted",label:"تحول لعميل ✓"},
    {id:"lost",label:"لم يكتمل"},

  const filt=filter==="all"?leads:leads.filter(l=>l.status===filter);
  const newCount=leads.filter(l=>l.status==="new").length;

  return(
    <div className="fi">
      <div className="ph">
        <div>
          <h1 style={{display:"flex",alignItems:"center",gap:12}}>
            طلبات الموقع
            {newCount>0&&<span className="bdg br2" style={{fontSize:14}}>{newCount} جديد</span>}
          </h1>
          <p>العملاء اللي ملوا فورم الطلب على موقع Delta Art</p>
        </div>
      </div>

      <div className="chips" style={{marginBottom:16}}>
        {STATUSES.map(s=>(
          <div key={s.id} className={`chip ${filter===s.id?"act":""}`} onClick={()=>setF(s.id)}>
            {s.label}
          </div>
        ))}
      </div>

      {filt.length===0
        ?<Empty icon="📬" text="مفيش طلبات بعد — شاركوا رابط الموقع!"/>
        :<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filt.map(lead=>(
            <div key={lead.id} className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
              <div style={{display:"flex",gap:14,alignItems:"center"}}>
                <div className="cav">
                  {lead.name?.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
                </div>
                <div>
                  <div className="fb2" style={{fontSize:14}}>{lead.name}</div>
                  <div className="tx tm">{lead.phone} · <span className="bdg ba2">{lead.service}</span>{lead.area&&` · ${lead.area} م²`}</div>
                  <div className="tx tm">{lead.location} · {lead.date}</div>
                </div>
              </div>
              <div className="fg2">
                <span className={`bdg ${SC[lead.status]||"bgr"}`}>{SL[lead.status]||lead.status}</span>
                {lead.photos?.length>0&&<span className="bdg bb2">📷 {lead.photos.length}</span>}
                <button className="btn bg bsm" onClick={()=>setSel(lead)}>التفاصيل</button>

                  <button className="btn bw bsm" onClick={()=>updateStatus(lead.id,"contacted")}>✓ تم التواصل</button>

          <label>تغيير الحالة</label>
          <div className="chips">
            {[{id:"new",lb:"جديد"},{id:"contacted",lb:"تم التواصل"},{id:"lost",lb:"لم يكتمل"}].map(s=>(
              <div key={s.id} className={`chip ${sel.status===s.id?"act":""}`} onClick={()=>updateStatus(sel.id,s.id)}>{s.lb}</div>
            ))}
          </div>
        </div>
        {sel.status!=="converted"
          ?<button className="btn ba bfl" onClick={()=>convertToClient(sel)}>👤 تحويل لعميل في النظام</button>
          :<div style={{textAlign:"center",padding:12,color:"var(--green)",fontWeight:700,fontSize:14}}>✅ تم تحويله لعميل بالفعل</div>}
      </Modal>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
